# ══════════════════════════════════════════════════════════════════════════════
# ESG Auditor – Celery Worker Kubernetes Deployment
# ══════════════════════════════════════════════════════════════════════════════
#
# Apply:
#   kubectl apply -f infra/k8s/worker-deployment.yaml
#
# Includes:
#   • Celery Worker Deployment  (audit + maintenance queues)
#   • Celery Beat Deployment    (scheduled retraining task)
#   • Worker ConfigMap
# ══════════════════════════════════════════════════════════════════════════════

---
# ── ConfigMap – worker non-secret config ──────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: esg-worker-config
  namespace: esg-auditor
  labels:
    app: esg-worker
    component: config
data:
  ENVIRONMENT:              "production"
  LOG_LEVEL:                "INFO"
  LOG_FORMAT:               "json"
  AUTO_TRAIN_MODEL:         "false"
  VERBOSE_AGENTS:           "false"
  AGENT_MAX_ITER:           "5"
  ZERO_SHOT_MODEL:          "facebook/bart-large-mnli"
  EMBEDDING_MODEL:          "sentence-transformers/all-MiniLM-L6-v2"
  EMBEDDING_DIM:            "384"
  DEVICE:                   "cpu"
  MAX_TEXTS_FOR_ZERO_SHOT:  "10"
  EMERGING_RISK_THRESHOLD:  "0.35"
  ENABLE_PDF_REPORTS:       "false"
  REPORTS_DIR:              "/app/outputs"
  DATA_DIR:                 "/app/data"
  MODEL_DIR:                "/app/ml/models"
  MODEL_PATH:               "/app/ml/models/esg_xgb_v1.pkl"
  PIPELINE_PATH:            "/app/ml/models/feature_pipeline.pkl"
  TEMPLATES_DIR:            "/app/templates"
  FAISS_INDEX_PATH:         "/app/data/faiss_index"
  CELERY_TASK_SOFT_TIME_LIMIT: "600"
  CELERY_TASK_TIME_LIMIT:      "900"

---
# ── Celery Worker Deployment ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esg-worker
  namespace: esg-auditor
  labels:
    app: esg-worker
    component: worker
    version: "1.0.0"
  annotations:
    kubernetes.io/change-cause: "Initial worker deployment"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: esg-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: esg-worker
        component: worker
      annotations:
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup:   1000

      # ── Init: wait for Redis ──────────────────────────────────────────────
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-service 6379; do
                echo "Waiting for Redis…"; sleep 3;
              done
          resources:
            limits:
              cpu:    "50m"
              memory: "32Mi"

      containers:
        - name: esg-worker
          image: your-registry.io/esg-auditor/worker:latest
          imagePullPolicy: Always

          command:
            - celery
            - -A
            - core.celery_app.celery_app
            - worker
            - --loglevel=info
            - --concurrency=2
            - -Q
            - audit,maintenance
            - --hostname=worker@%h
            - --max-tasks-per-child=50

          envFrom:
            - configMapRef:
                name: esg-worker-config

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: redis-url
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: redis-url
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: redis-result-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: secret-key
            - name: NEWS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: news-api-key
                  optional: true

          # ── Liveness – Celery ping ─────────────────────────────────────────
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - core.celery_app.celery_app
                - inspect
                - ping
                - --timeout=5
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
            timeoutSeconds: 10

          resources:
            requests:
              cpu:    "500m"
              memory: "1Gi"
            limits:
              cpu:    "2000m"
              memory: "4Gi"     # NLP models require extra headroom

          volumeMounts:
            - name: reports
              mountPath: /app/outputs
            - name: model-artifacts
              mountPath: /app/ml/models
              readOnly: true
            - name: tmp
              mountPath: /tmp

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   false
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: esg-reports-pvc
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: esg-models-pvc
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["esg-worker"]
                topologyKey: "kubernetes.io/hostname"

      terminationGracePeriodSeconds: 60   # allow long-running audits to finish

---
# ── Worker HPA ─────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: esg-worker-hpa
  namespace: esg-auditor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: esg-worker
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ── Celery Beat Deployment (singleton scheduler) ───────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esg-beat
  namespace: esg-auditor
  labels:
    app: esg-beat
    component: beat-scheduler
spec:
  replicas: 1           # MUST be 1 – running multiple beats causes duplicate tasks
  selector:
    matchLabels:
      app: esg-beat
  strategy:
    type: Recreate      # Recreate prevents two beat instances during rollout
  template:
    metadata:
      labels:
        app: esg-beat
        component: beat-scheduler
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis-service 6379; do sleep 3; done"]
          resources:
            limits:
              cpu:    "50m"
              memory: "32Mi"

      containers:
        - name: esg-beat
          image: your-registry.io/esg-auditor/worker:latest
          imagePullPolicy: Always

          command:
            - celery
            - -A
            - core.celery_app.celery_app
            - beat
            - --loglevel=info
            - --schedule=/tmp/celerybeat-schedule

          envFrom:
            - configMapRef:
                name: esg-worker-config

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: redis-url
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: redis-url
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: redis-result-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: secret-key

          resources:
            requests:
              cpu:    "50m"
              memory: "128Mi"
            limits:
              cpu:    "250m"
              memory: "256Mi"

          volumeMounts:
            - name: tmp
              mountPath: /tmp

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: tmp
          emptyDir: {}

      terminationGracePeriodSeconds: 30