# ══════════════════════════════════════════════════════════════════════════════
# ESG Auditor – FastAPI Kubernetes Deployment + Service
# ══════════════════════════════════════════════════════════════════════════════
#
# Apply:
#   kubectl apply -f infra/k8s/api-deployment.yaml
#
# Prerequisites:
#   • Secret "esg-secrets" must exist (see secret template at bottom)
#   • PersistentVolumeClaim "esg-reports-pvc" must exist
#   • Image pushed to your registry (update image: field below)
# ══════════════════════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: Namespace
metadata:
  name: esg-auditor
  labels:
    app.kubernetes.io/name: esg-auditor
    environment: production

---
# ── ConfigMap – non-secret runtime config ─────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: esg-api-config
  namespace: esg-auditor
  labels:
    app: esg-api
    component: config
data:
  ENVIRONMENT:            "production"
  DEBUG:                  "false"
  API_HOST:               "0.0.0.0"
  API_PORT:               "8000"
  LOG_LEVEL:              "INFO"
  LOG_FORMAT:             "json"
  ENABLE_METRICS:         "true"
  AUTO_TRAIN_MODEL:       "false"
  VERBOSE_AGENTS:         "false"
  AGENT_MAX_ITER:         "5"
  ZERO_SHOT_MODEL:        "facebook/bart-large-mnli"
  EMBEDDING_MODEL:        "sentence-transformers/all-MiniLM-L6-v2"
  EMBEDDING_DIM:          "384"
  DEVICE:                 "cpu"
  MAX_TEXTS_FOR_ZERO_SHOT: "10"
  EMERGING_RISK_THRESHOLD: "0.35"
  ENABLE_PDF_REPORTS:     "false"
  REPORTS_DIR:            "/app/outputs"
  DATA_DIR:               "/app/data"
  MODEL_DIR:              "/app/ml/models"
  MODEL_PATH:             "/app/ml/models/esg_xgb_v1.pkl"
  PIPELINE_PATH:          "/app/ml/models/feature_pipeline.pkl"
  TEMPLATES_DIR:          "/app/templates"
  FAISS_INDEX_PATH:       "/app/data/faiss_index"

---
# ── Deployment ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esg-api
  namespace: esg-auditor
  labels:
    app: esg-api
    component: api
    version: "1.0.0"
  annotations:
    kubernetes.io/change-cause: "Initial deployment"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: esg-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: esg-api
        component: api
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      # ── Security context ──────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup:   1000

      # ── Init container – wait for PostgreSQL ──────────────────────────────
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for PostgreSQL…"; sleep 3;
              done
          resources:
            limits:
              cpu:    "50m"
              memory: "32Mi"

      containers:
        - name: esg-api
          # ── Replace with your registry image ──────────────────────────────
          image: your-registry.io/esg-auditor/api:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # ── Non-secret config ─────────────────────────────────────────────
          envFrom:
            - configMapRef:
                name: esg-api-config

          # ── Secrets ───────────────────────────────────────────────────────
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: redis-url
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: redis-url
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: redis-result-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: secret-key
            - name: NEWS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: esg-secrets
                  key: news-api-key
                  optional: true

          # ── Probes ────────────────────────────────────────────────────────
          startupProbe:
            httpGet:
              path: /livez
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          # ── Resources ─────────────────────────────────────────────────────
          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "2Gi"

          # ── Volume mounts ─────────────────────────────────────────────────
          volumeMounts:
            - name: reports
              mountPath: /app/outputs
            - name: model-artifacts
              mountPath: /app/ml/models
              readOnly: true
            - name: tmp
              mountPath: /tmp

          # ── Container security ────────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   false   # uvicorn writes uvicorn.log
            capabilities:
              drop: ["ALL"]

      # ── Volumes ───────────────────────────────────────────────────────────
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: esg-reports-pvc
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: esg-models-pvc
        - name: tmp
          emptyDir: {}

      # ── Pod scheduling ────────────────────────────────────────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["esg-api"]
                topologyKey: "kubernetes.io/hostname"

      terminationGracePeriodSeconds: 30

---
# ── Service ────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: esg-api-service
  namespace: esg-auditor
  labels:
    app: esg-api
spec:
  selector:
    app: esg-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP

---
# ── HorizontalPodAutoscaler ────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: esg-api-hpa
  namespace: esg-auditor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: esg-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ── PersistentVolumeClaim – reports ───────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esg-reports-pvc
  namespace: esg-auditor
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
# ── PersistentVolumeClaim – model artifacts ────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esg-models-pvc
  namespace: esg-auditor
spec:
  accessModes: [ReadOnlyMany]
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard

---
# ── Secret template (fill in values and apply) ────────────────────────────────
# kubectl create secret generic esg-secrets -n esg-auditor \
#   --from-literal=database-url='postgresql+asyncpg://user:pass@postgres:5432/esg_auditor' \
#   --from-literal=redis-url='redis://:password@redis:6379/0' \
#   --from-literal=redis-result-url='redis://:password@redis:6379/1' \
#   --from-literal=secret-key='your-32-char-secret-key-here!!' \
#   --from-literal=news-api-key=''